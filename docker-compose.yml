services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hr_screening_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      GOOGLE_SERVICE_ACCOUNT_JSON_PATH: /run/secrets/google_sa.json
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./google_sa.json:/run/secrets/google_sa.json:ro

  redis:
    image: redis:7-alpine
    container_name: hr_screening_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

volumes:
  redis_data:
